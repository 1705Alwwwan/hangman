name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/1705alwwwan/hangman

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Apply Kubernetes Manifest
        run: |
          kubectl apply -f k3s/

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/hangman \
          hangman=${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n hangman

      - name: Wait Rollout
        run: |
          kubectl rollout status deployment/hangman -n hangman
