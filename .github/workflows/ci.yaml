name: CI

on:

  push:

    branches:

      - main

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository }}:latest .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository }}/hangman:latest
