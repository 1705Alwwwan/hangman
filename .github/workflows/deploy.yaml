name: Deploy

on:

  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: hangman-image

      - name: Import Image to K3s
        run: |
          sudo k3s ctr images import hangman.tar

      - name: Deploy Kubernetes
        run: |
          kubectl apply -f k8s/

      - name: Restart Deployment
        run: |
          kubectl rollout restart deployment hangman -n hangman

      - name: Wait Rollout
        run: |
          kubectl rollout status deployment hangman -n hangman
